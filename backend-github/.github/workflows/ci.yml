name: TestGenie Backend CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: testgenie_test
        ports:
          - 5432:5432
        volumes:
          - ${{ github.workspace }}/docker/init.sql:/docker-entrypoint-initdb.d/001_init.sql
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/testgenie_test
      JWT_SECRET: ci-test-secret-that-is-at-least-32-characters-long
      JWT_ACCESS_EXPIRY: 15m
      JWT_REFRESH_EXPIRY: 7d
      OPENAI_API_KEY: sk-test-placeholder
      NODE_ENV: test
      CORS_ORIGIN: http://localhost:5173

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run database migrations
        run: |
          PGPASSWORD=postgres psql -h localhost -U postgres -d testgenie_test -f docker/init.sql

      - name: Run tests
        run: npm test

      - name: Syntax check all source files
        run: |
          find src -name '*.js' | while read f; do
            node -c "$f" || exit 1
          done

  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check for security vulnerabilities
        run: npm audit --production --audit-level=critical || true
